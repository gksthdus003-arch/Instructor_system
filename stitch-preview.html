<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stitch 디자인 프리뷰</title>
  <style>
    :root { --line:#e2e8f0; --bg:#f8fafc; --text:#0f172a; --primary:#2563eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Inter, "Noto Sans KR", sans-serif; color:var(--text); background:var(--bg); }
    .wrap { display:grid; grid-template-columns: 320px 1fr; min-height:100vh; }
    .left { border-right:1px solid var(--line); background:#fff; padding:16px; }
    .left h1 { margin:0 0 8px; font-size:18px; }
    .left p { margin:0 0 14px; font-size:13px; color:#64748b; }
    .btn { width:100%; text-align:left; border:1px solid var(--line); background:#fff; padding:10px 12px; border-radius:10px; margin-bottom:8px; cursor:pointer; font-weight:600; }
    .btn.active { border-color:var(--primary); background:#eff6ff; color:var(--primary); }
    .meta { margin-top:12px; font-size:12px; color:#64748b; }
    .right { padding:12px; }
    iframe { width:100%; height:calc(100vh - 24px); border:1px solid var(--line); border-radius:12px; background:#fff; }
    @media (max-width: 960px) { .wrap { grid-template-columns: 1fr; } .right { padding:8px; } iframe { height:70vh; } }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="left">
      <h1>Stitch 디자인 프리뷰</h1>
      <p>공유해주신 메뉴 디자인을 한 페이지에서 테스트합니다.</p>
      <button class="btn active" data-src="/stitch/prd_dashboard_with_alerts_1/code.html">대시보드(알림형) 1</button>
      <button class="btn" data-src="/stitch/prd_dashboard_with_alerts_2/code.html">대시보드(알림형) 2</button>
      <button class="btn" data-src="/stitch/instructor_list_detail_card/code.html">강사 리스트/상세 카드</button>
      <button class="btn" data-src="/stitch/schedule_calendar_conflict_check/code.html">일정 캘린더/충돌체크</button>
      <button class="btn" data-src="/stitch/batch_settlement_bulk_email/code.html">정산/일괄 메일</button>
      <div class="meta">
        실행 URL: <code>http://127.0.0.1:4000/preview</code><br/>
        백엔드 API 테스트와 별도로 디자인 확인용입니다.
      </div>
    </aside>
    <main class="right">
      <iframe id="frame" src="/stitch/prd_dashboard_with_alerts_1/code.html" title="stitch preview"></iframe>
    </main>
  </div>
  <script>
    const frame = document.getElementById("frame");
    document.querySelectorAll(".btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        frame.src = btn.dataset.src;
      });
    });
  </script>
</body>
</html>
