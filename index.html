<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강사 관리 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="loginModal" class="modal hidden">
    <div class="modal-box login-box">
      <h2>로그인</h2>
      <p class="sub">예시 계정: <b>admin</b> / <b>manager1</b> (비밀번호 미입력 가능)</p>
      <div class="mt-12">
        <label>아이디</label>
        <input id="loginId" placeholder="admin" />
      </div>
      <div class="mt-10">
        <label>비밀번호</label>
        <input id="loginPw" type="password" placeholder="********" />
      </div>
      <div class="row row-end mt-14">
        <button class="btn primary" onclick="login()">로그인</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="brand">강사 관리 시스템</div>
      <button class="menu-btn active" data-view="dashboard">대시보드</button>
      <button class="menu-btn" data-view="instructors">강사 관리</button>
      <button class="menu-btn" data-view="requests">강의 일정 요청</button>
      <button class="menu-btn" data-view="schedule">일정 관리</button>
      <button class="menu-btn" data-view="settlement">출강·정산 관리</button>
      <button class="menu-btn" data-view="settings">설정</button>
      <button class="menu-btn" data-view="admin">관리자 설정</button>
    </aside>

    <div>
      <header class="top">
        <div>
          <div id="pageTitle" class="title">대시보드</div>
          <div id="pageSub" class="sub"></div>
        </div>
        <div class="row">
          <span id="currentUser" class="sub"></span>
          <div style="position: relative;">
            <button class="btn" id="alertBtn" onclick="toggleAlertPanel(event)">알림 0건</button>
            <div id="alertPanel" class="alert-popover hidden"></div>
          </div>
          <button class="btn" onclick="logout()">로그아웃</button>
        </div>
      </header>

      <main class="main">
        <section id="view-dashboard" class="section active"></section>
        <section id="view-instructors" class="section"></section>
        <section id="view-requests" class="section"></section>
        <section id="view-schedule" class="section"></section>
        <section id="view-settlement" class="section"></section>
        <section id="view-settings" class="section"></section>
        <section id="view-admin" class="section"></section>
      </main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <script src="./app.config.js"></script>
  <script src="./app.api.js"></script>
  <script src="./app.state.js"></script>
  <script src="./app.dashboard.js"></script>
  <script src="./app.instructors.js"></script>
  <script src="./app.requests.js"></script>
  <script src="./app.schedule.js"></script>
  <script src="./app.settlement.js"></script>
  <script src="./app.admin.js"></script>
  <script src="./app.bootstrap.js"></script>
</body>
</html>
